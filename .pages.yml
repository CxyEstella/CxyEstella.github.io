settings:
  content:
    merge: true

media:
  - name: uploads
    label: Uploads
    input: public/uploads
    output: /uploads
    extensions: [jpg, jpeg, png, webp, gif, svg]

content:
  - name: blog
    label: Blog
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename: "{slug}/index.mdx"
    subfolders: true
    view:
      primary: title
      fields: [title, pubDate, tags]
      sort: [updatedDate, pubDate, title]
      search: [title, description, tags, body]
      default:
        sort: updatedDate
        order: desc
      node:
        filename: index.mdx
        hideDirs: all
    fields: &base_fields
      - name: title
        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Published
        type: date
      - name: updatedDate
        label: Updated
        type: date
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
          creatable: true
      - name: draft
        label: Draft
        type: boolean
      - name: featured
        label: Featured
        type: boolean
      - name: toc
        label: Show TOC
        type: boolean
      - name: cover
        label: Cover Image
        type: image
        options:
          media: uploads
      - name: coverAlt
        label: Cover Alt
        type: string
      - name: body
        label: Body
        type: rich-text
        options:
          media: uploads
          path: blog
          extensions: [jpg, jpeg, png, webp, gif, svg]

