        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: description
        label: Description
        type: text
      - name: pubDate
        label: Published
        type: date
      - name: updatedDate
        label: Updated
        type: date
      - name: tags
        label: Tags
        type: select
        options:
          multiple: true
